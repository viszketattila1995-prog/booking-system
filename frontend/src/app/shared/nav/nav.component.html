<nav class="nav">
  <a class="nav__brand" routerLink="/providers">
    <span class="nav__brand-mark">B</span>
    Booking System
  </a>

  <div class="nav__links">
    @if (isAuthenticated()) {
      <a routerLink="/providers" routerLinkActive="is-active">Providers</a>
      <a routerLink="/bookings" routerLinkActive="is-active">My Bookings</a>
      @if (isProvider()) {
        <a routerLink="/provider/services" routerLinkActive="is-active">My Services</a>
      } @else {
        <a routerLink="/provider" routerLinkActive="is-active">Become a Provider</a>
      }
      @if (isAdmin()) {
        <a routerLink="/admin/providers" routerLinkActive="is-active">Admin</a>
      }
    }

    <button
      type="button"
      class="theme-toggle"
      (click)="toggleTheme()"
      [attr.aria-label]="theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
      title="Toggle dark mode"
    >
      @if (theme() === 'dark') {
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="4" />
          <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" />
        </svg>
      } @else {
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
          <path d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 1020.354 15.354z" />
        </svg>
      }
    </button>

    @if (isAuthenticated()) {
      <a class="nav__profile" routerLink="/profile" routerLinkActive="is-active" title="My profile">
        <span class="avatar">{{ initials() }}</span>
        <span class="nav__user">{{ currentUser()?.fullName }}</span>
      </a>
      <button type="button" class="btn btn--ghost" (click)="logout()">Log out</button>
    } @else {
      <a routerLink="/login" routerLinkActive="is-active">Log in</a>
      <a routerLink="/register" class="btn">Register</a>
    }
  </div>
</nav>
