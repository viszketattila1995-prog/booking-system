services:
  postgres:
    image: postgres:16-alpine
    container_name: booking-system-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: booking_system
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - booking-system-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d booking_system"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  booking-system-postgres-data:
